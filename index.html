<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR PLN Learning System</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- A-Frame & MindAR (Loaded globally to prevent conflicts) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <!-- Main Styles -->
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="/src/styles/ui.css">
</head>
<body>

    <!-- Loading Screen (Premium UI) -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader-content">
            <div class="logo-container">
                <div class="pln-lightning">⚡</div>
            </div>
            <h2>AR PLN System</h2>
            <p>Memuat Aset 3D & Sistem Pelacakan...</p>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="loading-text" class="loading-text-small">Menyiapkan Kamera...</p>
        </div>
    </div>

    <!-- UI Overlay (Glassmorphism) -->
    <div id="ui-layer" class="ui-layer hidden">
        <header class="glass-header">
            <div class="header-content">
                <span class="pulse-dot"></span>
                <span id="status-text">Mencari Marker...</span>
            </div>
            <button id="btn-download-marker" class="btn-glass">Unduh Marker</button>
        </header>

        <!-- Dynamic Info Panel -->
        <div id="info-panel" class="glass-panel hidden">
            <div class="panel-header">
                <h3 id="info-title">Nama Komponen</h3>
                <span class="badge">PLN</span>
            </div>
            <div class="panel-body">
                <p id="info-function" class="function-text">Fungsi komponen</p>
                <p id="info-desc" class="desc-text">Deskripsi lengkap</p>
            </div>
            
            <div id="buttons-container" class="buttons-grid">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </div>

    <!-- Download Marker Modal -->
    <div id="modal-marker" class="modal hidden">
        <div class="modal-box glass-panel">
            <h3>Pilih Marker</h3>
            <p>Silakan scan marker di bawah ini:</p>
            <div class="marker-links">
                <a href="https://raw.githubusercontent.com/AndriPr/Augmented-Reality-Learning-Project/main/public/assets/targets/marker_gearbox.png" target="_blank" class="btn-primary">Marker Gearbox</a>
                <a href="https://raw.githubusercontent.com/AndriPr/Augmented-Reality-Learning-Project/main/public/assets/targets/marker_trafo.png" target="_blank" class="btn-primary">Marker Trafo</a>
            </div>
            <button id="btn-close-modal" class="btn-outline">Tutup</button>
        </div>
    </div>

    <!-- AR Scene (Injected by JS to ensure lifecycle control) -->
    <div id="ar-container"></div>

    <!-- Main Entry Point -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
